services:
  # MongoDB Database Service
  mongo:
    # Official MongoDB image
    image: mongo:7

    # Custom container name
    container_name: lyrix-mongo

    # Expose Port
    ports:
      - "27017:27017"

    # Automatically restart unless manually stopped
    restart: unless-stopped

    # Load MongoDB environment variables
    env_file:
      - ./server/.env

    # Persist MongoDB data using named volume
    volumes:
      - mongo-data:/data/db

     # Health check to ensure MongoDB is ready
    healthcheck:
      # Ping MongoDB server
      test: [
        "CMD-SHELL",
        "mongosh --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping')\""
      ]
      interval: 30s               # Run health check every 30 seconds
      timeout: 10s                # Health check timeout duration
      retries: 5                  # Mark container unhealthy after 5 failures
      start_period: 20s           # Wait before starting health checks
    
    # Connect to custom bridge network
    networks:
      - lyrix-network

  # Backend API Service
  api:
    # Build the Docker image from the ./server directory
    build:
      context: ./server            # Path to backend source code
      dockerfile: Dockerfile       # Dockerfile used for building the image
    
    # Custom container name
    container_name: lyrix-server
    
    # Expose container port 3000 to host port 3000
    ports:
      - "3001:3000"
    
    # Automatically restart container unless manually stopped
    restart: unless-stopped
    
    # Load environment variables from .env file
    env_file:
      - ./server/.env

    # Wait for MongoDB to become healthy before starting API
    depends_on:
      mongo:
        condition: service_healthy
    
    # Health check to verify API is responding
    healthcheck:
      # Send HTTP request to /health endpoint
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s               # Run health check every 30 seconds
      timeout: 10s                # Health check timeout duration
      retries: 3                  # Mark container unhealthy after 3 failures
      start_period: 10s           # Wait 10 seconds before starting health checks
    
    # Connect container to custom bridge network
    networks:
      - lyrix-network

# Named Volumes
volumes:
  # Persistent storage for MongoDB data
  mongo-data:

# Define custom Docker network
networks:
  lyrix-network:
    # Default bridge network driver
    driver: bridge
